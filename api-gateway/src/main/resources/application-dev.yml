server:
  port: ${API_GATEWAY_PORT}

spring:
  config:
    activate:
      on-profile: dev
  cloud:
    gateway:
      routes:
        # ────────────────────────────────
        # Health Check
        # ────────────────────────────────
        - id: auth-service-health
          uri: http://localhost:${AUTH_SERVICE_PORT}
          predicates:
            - Path=/health/auth
          filters:
            - RewritePath=/health/auth, /actuator/health

        - id: user-service-health
          uri: http://localhost:${USER_SERVICE_PORT}
          predicates:
            - Path=/health/user
          filters:
            - RewritePath=/health/user, /actuator/health

        - id: meeting-service-health
          uri: http://localhost:${MEETING_SERVICE_PORT}
          predicates:
            - Path=/health/meeting
          filters:
            - RewritePath=/health/meeting, /actuator/health

        - id: review-service-health
          uri: http://localhost:${REVIEW_SERVICE_PORT}
          predicates:
            - Path=/health/review
          filters:
            - RewritePath=/health/review, /actuator/health

        - id: chat-service-health
          uri: http://localhost:${CHAT_SERVICE_PORT}
          predicates:
            - Path=/health/chat
          filters:
            - RewritePath=/health/chat, /actuator/health

        - id: notification-service-health
          uri: http://localhost:${NOTIFICATION_SERVICE_PORT}
          predicates:
            - Path=/health/notification
          filters:
            - RewritePath=/health/notification, /actuator/health

        # ────────────────────────────────
        # Prometheus 메트릭
        # ────────────────────────────────
        - id: auth-service-prometheus
          uri: http://localhost:${AUTH_SERVICE_PORT}
          predicates:
            - Path=/prometheus/auth
          filters:
            - RewritePath=/prometheus/auth, /actuator/prometheus

        - id: user-service-prometheus
          uri: http://localhost:${USER_SERVICE_PORT}
          predicates:
            - Path=/prometheus/user
          filters:
            - RewritePath=/prometheus/user, /actuator/prometheus

        - id: meeting-service-prometheus
          uri: http://localhost:${MEETING_SERVICE_PORT}
          predicates:
            - Path=/prometheus/meeting
          filters:
            - RewritePath=/prometheus/meeting, /actuator/prometheus

        - id: review-service-prometheus
          uri: http://localhost:${REVIEW_SERVICE_PORT}
          predicates:
            - Path=/prometheus/review
          filters:
            - RewritePath=/prometheus/review, /actuator/prometheus

        - id: chat-service-prometheus
          uri: http://localhost:${CHAT_SERVICE_PORT}
          predicates:
            - Path=/prometheus/chat
          filters:
            - RewritePath=/prometheus/chat, /actuator/prometheus

        - id: notification-service-prometheus
          uri: http://localhost:${NOTIFICATION_SERVICE_PORT}
          predicates:
            - Path=/prometheus/notification
          filters:
            - RewritePath=/prometheus/notification, /actuator/prometheus

        # ────────────────────────────────
        # API 라우팅
        # ────────────────────────────────
        - id: auth-service
          uri: http://localhost:${AUTH_SERVICE_PORT}
          predicates:
            - Path=/api/auth/**

        - id: user-service
          uri: http://localhost:${USER_SERVICE_PORT}
          predicates:
            - Path=/api/users/**

        - id: meeting-service
          uri: http://localhost:${MEETING_SERVICE_PORT}
          predicates:
            - Path=/api/meetings/**

        - id: review-service
          uri: http://localhost:${REVIEW_SERVICE_PORT}
          predicates:
            - Path=/api/reviews/**

        - id: chat-service
          uri: http://localhost:${CHAT_SERVICE_PORT}
          predicates:
            - Path=/api/chat/**

        - id: notification-service
          uri: http://localhost:${NOTIFICATION_SERVICE_PORT}
          predicates:
            - Path=/api/notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
logging:
  level:
    org.springframework.cloud.gateway: DEBUG